<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    min-height:100vh;
    color:#333;
}

header{
    text-align:center;
    padding:60px 20px;
    color:white;
}

header h1{
    font-size:3rem;
}

header p{
    margin-top:10px;
    font-size:1.2rem;
}

nav{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

nav button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:white;
    cursor:pointer;
    font-weight:500;
}

nav button:hover{
    background:rgba(255,255,255,0.8);
}

section{
    padding:40px 10%;
    display:none;
}

.active{
    display:block;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:15px;
    transition:0.4s;
    cursor:pointer;
}

.gallery img:hover{
    transform:scale(1.08);
}


.slideshow-container{
    position: relative;
    width: 70%;
    max-width:500px;
    margin:auto;
    overflow:hidden;
    height:300px; 
}

.slideshow-container img{
    width:80%;
    height: 100%;
    position:absolute;
    top:0;
    left:0;
    opacity:0;
    border-radius:15px;
    transition:0.1s;
    transition:opacity 1s ease-in-out;
}


.slideshow-container img.active{
    opacity:1;
}

.message{
    text-align:center;
    font-size:1.5rem;
    color:white;
}

footer{
    text-align:center;
    padding:20px;
    color:white;
}

@media(max-width:600px){
    header h1{
        font-size:2rem;
    }
    .slideshow-container{
        width:100%;
    }
}

</style>
</head>
<body>

<header>
<h1>🎉 Happy Birthday! 🎂</h1>
<p>Celebrating your special day with love and memories!</p>

<nav>
    <button onclick="showSection('gallery')">Gallery</button>
    <button onclick="showSection('slideshow')">Slideshow</button>
    <button onclick="showSection('message')">Message</button>
</nav>
</header>

<section id="gallery" class="active">
<h2>Photo Gallery</h2>
<div class="gallery">
    <img src="abouyassin-man-5935150_1920.jpg" alt="Photo 1">
    <img src="luischfernandez-man-7946011_1920.jpg" alt="Photo 2">
    <img src="pranavjassi-man-6691157_1920.jpg" alt="Photo 3">
    <img src="sjjp-portrait-814645_1920.jpg" alt="Photo 4">
    <img src="vladbitte-black-and-white-4387130_1920.jpg" alt="Photo 5">
    <img src="ysnkse-male-2412845_1920.jpg" alt="Photo 6">
</div>
</section>

<section id="slideshow">
<h2>Memories Slideshow</h2>
<div class="slideshow-container">
    <img src="abouyassin-man-5935150_1920.jpg" alt="Slideshow 1" class="active">
    <img src="luischfernandez-man-7946011_1920.jpg" alt="Slideshow 2">
    <img src="pranavjassi-man-6691157_1920.jpg" alt="Slideshow 3">
    <img src="sjjp-portrait-814645_1920.jpg" alt="Slideshow 4">
    <img src="vladbitte-black-and-white-4387130_1920.jpg" alt="Slideshow 5">
    <img src="ysnkse-male-2412845_1920.jpg" alt="Slideshow 6">
</div>
</section>

<section id="message">
<div class="message">
    <p>💖 Wishing you a day filled with happiness and a year filled with joy.  
    You deserve all the amazing things life has to offer! 💖</p>
</div>
</section>

<footer>
Made with ❤️ for your special day
</footer>

<script>
// Section navigation
function showSection(id){
    document.querySelectorAll("section").forEach(s=>{
        s.classList.remove("active")
    })
    document.getElementById(id).classList.add("active")
}

// Automatic slideshow logic
const slides = document.querySelectorAll('.slideshow-container img');
let current = 0;

function showNextSlide() {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
}

// Change slide every 3 seconds
setInterval(showNextSlide, 3000);

</script>

</body>
</html>
